<!-- Página de Login: layout split con branding izquierdo y formulario derecho -->
<div class="login-layout">

  <!-- Panel izquierdo: fondo con imagen/color, componente de branding encima -->
  <section class="branding-panel-bg">
    <app-login-branding />
  </section>

  <!-- Panel derecho: componente presentacional de formulario -->
  <section class="form-panel">
    <app-login-form (loginSubmit)="onLogin($event)" />
  </section>

</div>
